name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK (EAS)
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "::error::Add EXPO_TOKEN to GitHub repo secrets. Create at https://expo.dev/accounts/settings#access-tokens"
            exit 1
          fi

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Link EAS project (non-interactive)
        run: eas init --id 1e9ffd82-b265-4f9b-a389-c2a981c57d01 --non-interactive --force
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK (preview)
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Get APK URL
        id: apk_url
        run: |
          URL=$(eas build:list --platform android --limit 1 --json | jq -r '.[0].artifacts.buildUrl')
          echo "url=$URL" >> $GITHUB_OUTPUT
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download APK
        run: curl -L "${{ steps.apk_url.outputs.url }}" -o tremorlog.apk

      - name: Get version
        id: version
        run: |
          VERSION=$(jq -r '.expo.version' app.json)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=v${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "name=TremorLog v${VERSION} (${SHORT_SHA})" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            ## TremorLog Android APK

            Built from commit ${{ github.sha }}

            ### Install
            1. Download `tremorlog.apk`
            2. Enable "Install from unknown sources" on your Android device
            3. Open the APK to install

            ### What's in this build
            - Accelerometer + gyroscope tremor capture (100Hz)
            - Advanced signal analysis: regularity index, harmonic ratio, intermittency, cross-axis phase
            - Tremor profile classification (Parkinson's-like / Essential / Physiological / Minimal)
            - Live waveform display
            - Session history + PDF report
          files: tremorlog.apk
          draft: false
          prerelease: true
