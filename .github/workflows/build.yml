name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK (EAS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK (preview)
        run: eas build --platform android --profile preview --non-interactive

      - name: Get APK download URL
        run: eas build:list --platform android --limit 1 --json | jq '.[0].artifacts.buildUrl'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
